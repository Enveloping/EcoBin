spring:
  datasource:
    url: jdbc:h2:mem:ecobin_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

# 微信小程序配置（测试环境占位）
wechat:
  miniapp:
    appid: test_appid
    secret: test_secret

# 应用加密配置（测试占位）
app:
  crypto:
    aes-key: test_aes_key

# OneNet 北向消费者测试环境强制关闭（绝不连真实 MQ）
onenet:
  subscription:
    enabled: false
