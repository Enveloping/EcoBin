spring:
  application:
    name: EcoBin

  # 加载项目根目录 .env（实为 Java properties；密钥不入库，仅本地/部署机存放）
  config:
    import: optional:file:./.env[.properties]

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/ecobin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置
jwt:
  secret: EcoBin_JWT_Secret_Key_2026_Must_Be_256_Bits_Long_Change_In_Production!!
  expiration: 86400000  # 24小时 (毫秒)

# 应用加密配置（用于 sys_tenant.miniapp_secret 等敏感字段 AES 加密）
app:
  crypto:
    aes-key: EcoBin_AES_Key_2026_Change_In_Production

# 微信小程序配置（请替换为真实值）
wechat:
  miniapp:
    appid: your_appid
    secret: your_secret

# 中国移动 OneNet 物联网平台
onenet:
  # 上行（北向 MQ 服务端订阅消费）：凭证由 .env 注入；非测试 + enabled + 凭证齐全才启动消费者
  subscription:
    broker-url: pulsar+ssl://iot-north-mq.heclouds.com:6651/
    access-id: ${iotAccessId:}
    secret-key: ${iotSecretKey:}
    subscription-name: ${iotSubscriptionName:}
    enabled: true
  # 下行（物模型服务调用）：product-id/access-key 待设备端配合到位；缺失时下发为占位日志
  base-url: https://iot-api.heclouds.com
  product-id: ${onenetProductId:}
  access-key: ${onenetAccessKey:}

# 腾讯云 COS 对象存储（STS 临时密钥，设备直传；凭证未到位时留空，STS 为占位日志）
cos:
  secret-id:
  secret-key:
  region:
  bucket-name:
  base-url:
  duration-seconds: 1800

# 服务器端口
server:
  port: 8080

# 日志
logging:
  level:
    org.enveloping.ecobin: DEBUG
